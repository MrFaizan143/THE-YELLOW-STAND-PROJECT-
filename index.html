<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>T Y S | 2026 Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <!-- Background Watermark -->
    <div class="wm" aria-hidden="true">THE YELLOW STAND</div>

    <!-- Bottom Navigation -->
    <nav id="main-nav" role="navigation" aria-label="Main navigation">
        <button class="n-i active" data-page="h" aria-current="page">Hub</button>
        <button class="n-i" data-page="m">Map</button>
        <button class="n-i" data-page="p">Pride</button>
        <button class="n-i" data-page="f">Feed</button>
    </nav>

    <!-- Pages -->
    <main>

        <!-- Hub Page -->
        <section id="h" class="page active" aria-label="Hub">
            <span class="tag">System 2026</span>
            <h1>T Y S.</h1>
            <div class="countdown-card">
                <p id="timer" class="countdown-display">Loading Countdown...</p>
                <p class="tag" style="margin-top: 10px;">March 30 vs RR</p>
            </div>
        </section>

        <!-- Map (Schedule) Page -->
        <section id="m" class="page" aria-label="Match Schedule">
            <span class="tag">Schedule</span>
            <h1>MAP.</h1>
            <div id="fixture-list" role="list"></div>
        </section>

        <!-- Pride (Squad) Page -->
        <section id="p" class="page" aria-label="Squad and Staff">
            <span class="tag">Squad &amp; Staff</span>
            <h1>PRIDE.</h1>
            <div id="squad-content"></div>
        </section>

        <!-- Feed (Community) Page -->
        <section id="f" class="page" aria-label="Community Feed">
            <span class="tag">Community</span>
            <h1>FEED.</h1>

            <!-- Match-day live banner (hidden until match day) -->
            <div id="match-day-banner" class="match-day-banner" hidden aria-live="polite">
                <span class="mdb-dot" aria-hidden="true"></span>
                Match day — live chat active
            </div>

            <!-- Compose form -->
            <form id="feed-compose" class="compose-form" novalidate>
                <input
                    class="compose-author"
                    type="text"
                    placeholder="Your name (optional)"
                    maxlength="30"
                    aria-label="Display name"
                    autocomplete="off"
                >
                <textarea
                    class="compose-textarea"
                    placeholder="Share your thoughts on CSK…"
                    maxlength="280"
                    aria-label="Post message"
                    required
                ></textarea>
                <div class="compose-footer">
                    <span class="char-counter" aria-live="polite">0 / 280</span>
                    <button type="submit" class="compose-submit">Post</button>
                </div>
                <p class="compose-error" hidden role="alert"></p>
            </form>

            <!-- Post list -->
            <div id="feed-list" role="feed" aria-label="Community posts"></div>
        </section>

    </main>

    <!-- Scripts (data first, then logic, then app init) -->
    <script src="src/data/team.js"></script>
    <script src="src/data/feed.js"></script>
    <script src="src/js/render.js"></script>
    <script src="src/js/router.js"></script>
    <script src="src/js/countdown.js"></script>
    <script src="src/js/feed.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
