<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="CSK fan hub — fixtures, squad &amp; countdown for the 2026 season.">
    <meta name="theme-color" content="#FDB913">
    <title>T Y S | 2026 Engine</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <!-- Background Watermark -->
    <div class="wm" aria-hidden="true">THE YELLOW STAND</div>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode">☀</button>

    <!-- Bottom Navigation -->
    <nav id="main-nav" role="navigation" aria-label="Main navigation">
        <button class="n-i active" data-page="h" aria-current="page">Hub</button>
        <button class="n-i" data-page="m">Map</button>
        <button class="n-i" data-page="p">Pride</button>
        <button class="n-i" data-page="n">News</button>
        <button class="n-i" data-page="f">Fan</button>
    </nav>

    <!-- Pages -->
    <main>

        <!-- Hub Page -->
        <section id="h" class="page active" aria-label="Hub">
            <span class="tag">System 2026</span>
            <h1>T Y S.</h1>
            <div class="countdown-card">
                <p id="timer" class="countdown-display" aria-live="off" aria-atomic="true">Loading Countdown...</p>
                <p class="tag" style="margin-top: 10px;">March 30 vs RR</p>
            </div>
            <div class="hub-info-row">
                <!-- Last Result Card -->
                <div class="hub-info-card" id="hub-last-result" aria-label="Last result"></div>
                <!-- Venue Card -->
                <div class="hub-info-card" id="hub-venue" aria-label="Next match venue"></div>
            </div>
            <div class="hub-record-wrap" aria-label="Season record">
                <span class="tag" style="margin-bottom: var(--space-2);">2026 Season Record</span>
                <p id="hub-record" class="hub-record">0W · 0L</p>
            </div>
            <button id="share-btn" class="share-btn" aria-label="Share match info">
                <span class="share-icon">↑</span> Share
            </button>
        </section>

        <!-- Map (Schedule) Page -->
        <section id="m" class="page" aria-label="Match Schedule">
            <span class="tag">Schedule</span>
            <h1>MAP.</h1>
            <div id="fixture-list" role="list"></div>
            <h2 class="section-heading" aria-label="IPL 2026 Points Table">Points Table</h2>
            <div id="standings-list" class="standings-table" role="table" aria-label="IPL 2026 points table"></div>
        </section>

        <!-- Pride (Squad) Page -->
        <section id="p" class="page" aria-label="Squad and Staff">
            <span class="tag">Squad &amp; Staff</span>
            <h1>PRIDE.</h1>
            <div id="squad-content"></div>
        </section>

        <!-- News Page -->
        <section id="n" class="page" aria-label="News and Updates">
            <span class="tag">Updates</span>
            <h1>NEWS.</h1>
            <div id="news-list"></div>
        </section>

        <!-- Fan Profile Page -->
        <section id="f" class="page" aria-label="Fan Profile">
            <span class="tag">Your Stand</span>
            <h1>FAN.</h1>
            <div id="poll-content"></div>
            <div id="fan-content"></div>
        </section>

    </main>

    <!-- Scripts (data first, then logic, then app init) -->
    <script src="src/data/team.js"></script>
    <script src="src/js/api.js"></script>
    <script src="src/js/results.js"></script>
    <script src="src/js/render.js"></script>
    <script src="src/js/router.js"></script>
    <script src="src/js/countdown.js"></script>
    <script src="src/js/profile.js"></script>
    <script src="src/js/news.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
