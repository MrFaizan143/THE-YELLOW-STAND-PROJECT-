<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>T Y S | 2026 Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <!-- Background Watermark -->
    <div class="wm" aria-hidden="true">THE YELLOW STAND</div>

    <!-- Bottom Navigation -->
    <nav id="main-nav" role="navigation" aria-label="Main navigation">
        <button class="n-i active" data-page="h" aria-current="page">Hub</button>
        <button class="n-i" data-page="m">Map</button>
        <button class="n-i" data-page="p">Pride</button>
    </nav>

    <!-- Pages -->
    <main>

        <!-- Hub Page -->
        <section id="h" class="page active" aria-label="Hub">
            <span class="tag">System 2026</span>
            <h1>T Y S.</h1>
            <div class="countdown-card">
                <p id="timer" class="countdown-display">Loading Countdown...</p>
                <p class="tag" style="margin-top: 10px;">March 30 vs RR</p>
            </div>

            <!-- Fan Mood Wall -->
            <div class="mood-wall">
                <span class="tag" style="margin-top: var(--space-8);">Fan Mood</span>
                <p class="mood-title">VIBE CHECK.</p>
                <div id="mood-reactions" class="mood-reactions" role="group" aria-label="Pre-match fan mood reactions"></div>
                <p id="mood-total" class="mood-total"></p>
            </div>
        </section>

        <!-- Map (Schedule) Page -->
        <section id="m" class="page" aria-label="Match Schedule">
            <span class="tag">Schedule</span>
            <h1>MAP.</h1>
            <div id="fixture-list" role="list"></div>
        </section>

        <!-- Pride (Squad) Page -->
        <section id="p" class="page" aria-label="Squad and Staff">
            <span class="tag">Squad &amp; Staff</span>
            <h1>PRIDE.</h1>
            <div id="squad-content"></div>
        </section>

    </main>

    <!-- Scripts (data first, then logic, then app init) -->
    <script src="src/data/team.js"></script>
    <script src="src/js/render.js"></script>
    <script src="src/js/router.js"></script>
    <script src="src/js/countdown.js"></script>
    <script src="src/js/mood.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
